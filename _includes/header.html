<a class="skip-link" href="#main">Skip to content</a>
<header class="site-header">
  <div class="wrap">
    <a class="wordmark" href="{{ '/' | relative_url }}">Constitutive Rhetoric Study</a>
    <nav class="site-nav" aria-label="Primary">
      <ul>
        {%- for item in site.data.nav -%}
        {%- assign item_url = item.url | relative_url -%}
        <li><a href="{{ item_url }}"{% if page.url == item.url %} aria-current="page"{% endif %}>{{ item.title }}</a></li>
        {%- endfor -%}
      </ul>
    </nav>
  </div>
</header>
