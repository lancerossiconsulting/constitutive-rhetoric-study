<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="exA-title exA-desc" font-family="Georgia, 'Times New Roman', serif">
  <title id="exA-title">Exhibit A — Charland's machine</title>
  <desc id="exA-desc">Identification and interpellation combine to constitute a people, which is given a transhistorical identity, a collective agency, and an embedded telos.</desc>
  <rect width="720" height="360" fill="#fbfbf9"/>
  <style>
    .box{fill:#fff;stroke:#6e2c2c;stroke-width:1.5}
    .soft{fill:#f3ebe7;stroke:#6e2c2c;stroke-width:1.5}
    .lbl{fill:#1a1a1a;font-size:15px}
    .cap{fill:#5a5a5a;font-size:12px;font-family:system-ui,sans-serif}
    .arr{stroke:#6e2c2c;stroke-width:1.5;fill:none;marker-end:url(#ah)}
  </style>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#6e2c2c"/>
    </marker>
  </defs>

  <!-- inputs -->
  <rect class="soft" x="20" y="60" width="170" height="48" rx="5"/>
  <text class="lbl" x="105" y="82" text-anchor="middle">Identification</text>
  <text class="cap" x="105" y="99" text-anchor="middle">Burke: shared substance</text>

  <rect class="soft" x="20" y="200" width="170" height="48" rx="5"/>
  <text class="lbl" x="105" y="222" text-anchor="middle">Interpellation</text>
  <text class="cap" x="105" y="239" text-anchor="middle">Althusser: the hailing</text>

  <!-- constituted people -->
  <rect class="box" x="275" y="128" width="170" height="56" rx="5"/>
  <text class="lbl" x="360" y="152" text-anchor="middle">Constituted</text>
  <text class="lbl" x="360" y="171" text-anchor="middle">“people”</text>

  <path class="arr" d="M190,84 C235,100 240,135 273,150"/>
  <path class="arr" d="M190,224 C235,208 240,177 273,162"/>

  <!-- effects -->
  <rect class="box" x="530" y="36" width="175" height="48" rx="5"/>
  <text class="lbl" x="617" y="58" text-anchor="middle">Transhistorical</text>
  <text class="lbl" x="617" y="75" text-anchor="middle">identity</text>

  <rect class="box" x="530" y="132" width="175" height="48" rx="5"/>
  <text class="lbl" x="617" y="154" text-anchor="middle">Collective agency</text>
  <text class="cap" x="617" y="171" text-anchor="middle">acting as one body</text>

  <rect class="box" x="530" y="228" width="175" height="48" rx="5"/>
  <text class="lbl" x="617" y="250" text-anchor="middle">Embedded telos</text>
  <text class="cap" x="617" y="267" text-anchor="middle">an end called its own</text>

  <path class="arr" d="M445,148 C485,120 490,90 528,68"/>
  <path class="arr" d="M445,156 L528,156"/>
  <path class="arr" d="M445,164 C485,192 490,222 528,244"/>
</svg>
