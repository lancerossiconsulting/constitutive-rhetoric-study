---
layout: default
---
<article class="page{% if page.prose %} prose{% endif %}">
  {%- if page.title -%}
  <header class="page-head">
    <h1>{{ page.title }}</h1>
    {%- if page.subtitle %}<p class="subtitle">{{ page.subtitle }}</p>{% endif -%}
    {%- if page.meta_line %}<p class="meta-line">{{ page.meta_line }}</p>{% endif -%}
  </header>
  {%- endif -%}
  {{ content }}
</article>
